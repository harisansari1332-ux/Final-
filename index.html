<style>
  :root{
    --orange:#FF8000;
    --orange-light:#FF9500;
    --black:#000000;
    --white:#FFFFFF;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    background:var(--white);
    color:var(--black);
    font-family:'Poppins',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  body{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    position:relative;
    padding-bottom:24px;
  }

  /* ===== HEADER ===== */
  header.brand{
    padding:38px 16px 34px;
    text-align:center;
    background:linear-gradient(135deg,var(--orange) 0%, var(--orange-light) 60%, #ffb866 100%);
    border-radius:0 0 32px 32px;
    position:relative;
    overflow:hidden;
  }
  header.brand .sparkle-line{
    font-size:11px;
    letter-spacing:4px;
    text-transform:uppercase;
    color:#fff;
    opacity:.9;
    font-weight:500;
    margin-bottom:14px;
  }
  header.brand h1{
    font-family:'Playfair Display',serif;
    font-weight:800;
    font-size:42px;
    letter-spacing:1px;
    color:#fff;
    position:relative;
    display:inline-block;
    text-shadow:0 4px 18px rgba(0,0,0,0.12);
  }
  header.brand h1 .script{
    font-style:italic;
    font-weight:600;
  }
  header.brand .divider{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin:18px auto 0;
  }
  header.brand .divider span{
    display:block;
    width:54px;
    height:1px;
    background:rgba(255,255,255,0.6);
  }
  header.brand .divider .dot{
    width:6px;height:6px;
    border-radius:50%;
    background:#fff;
  }
  header.brand p.tagline{
    font-size:13px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:#fff;
    opacity:.95;
    margin-top:10px;
    font-weight:500;
  }

  /* ===== SEARCH BAR ===== */
  .search-wrap{
    padding:14px 16px 8px;
  }
  .search-bar{
    display:flex;
    align-items:center;
    background:#FFF;
    border:1.5px solid #f0e6da;
    box-shadow:0 4px 16px rgba(255,128,0,0.08);
    border-radius:999px;
    padding:12px 18px;
    gap:10px;
  }
  .search-bar svg{flex-shrink:0;}
  .search-input-wrap{
    position:relative;
    flex:1;
    height:20px;
    overflow:hidden;
  }
  .search-input-wrap input{
    width:100%;
    border:none;
    outline:none;
    background:transparent;
    font-size:16px;
    font-family:'Poppins',sans-serif;
    color:var(--black);
    position:relative;
    z-index:2;
  }
  .placeholder-fx{
    position:absolute;
    left:0;top:0;
    font-size:16px;
    color:#aaa;
    pointer-events:none;
    z-index:1;
    white-space:nowrap;
  }
  .search-input-wrap input:focus + .placeholder-fx,
  .search-input-wrap input:not(:placeholder-shown) + .placeholder-fx{
    display:none;
  }

  /* ===== ACTIVE SESSION BANNER ===== */
  .session-banner {
    display: none;
    background: #fff3e0;
    border: 1px dashed var(--orange);
    margin: 10px 16px;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 13px;
    align-items: center;
    justify-content: space-between;
  }
  .session-banner button {
    background: var(--orange);
    color: #fff;
    border: none;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
  }

  /* ===== CATEGORY TABS ===== */
  .tabs-wrap{
    padding:14px 0 6px;
  }
  .tabs{
    display:flex;
    gap:10px;
    overflow-x:auto;
    padding:0 16px 4px;
    scrollbar-width:none;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    flex-shrink:0;
    padding:10px 20px;
    border-radius:999px;
    font-size:16px;
    font-weight:500;
    background:#FFF;
    color:var(--black);
    border:1.5px solid #eee;
    cursor:pointer;
    transition:background .25s,color .25s,border-color .25s,transform .15s;
    white-space:nowrap;
    user-select:none;
  }
  .tab:active{transform:scale(0.96);}
  .tab.active{
    background:var(--orange);
    border-color:var(--orange);
    color:var(--white);
    font-weight:600;
    box-shadow:0 4px 14px rgba(255,128,0,0.35);
  }

  /* ===== GRID ===== */
  .menu-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    padding:14px 16px 30px;
  }

  /* ===== CARD ===== */
  .card{
    background:var(--white);
    border-radius:24px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 6px 20px rgba(0,0,0,0.06);
    border:1px solid #f5f0ea;
    animation:fadeIn .4s ease both;
  }
  @keyframes fadeIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
  }

  .card-thumb{
    width:100%;
    aspect-ratio:1/1;
    position:relative;
    background:#FFFFFF;
    overflow:hidden;
  }
  .card-thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .badge-3d{
    position:absolute;
    top:8px;
    left:8px;
    background:var(--orange);
    color:var(--white);
    font-size:10px;
    font-weight:700;
    letter-spacing:1px;
    padding:4px 9px;
    border-radius:999px;
    z-index:5;
    box-shadow:0 2px 8px rgba(255,128,0,0.4);
  }

  .card-body{
    padding:12px 14px 14px;
    display:flex;
    flex-direction:column;
    flex:1;
    gap:6px;
  }
  .card-title{
    font-size:16px;
    font-weight:700;
    line-height:1.25;
    color:var(--black);
    min-height:40px;
  }
  .card-desc{
    font-size:12px;
    font-weight:400;
    color:#666;
    line-height:1.35;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
    min-height:32px;
  }
  .card-price{
    font-size:16px;
    font-weight:600;
    color:var(--orange);
    margin-top:2px;
  }
  .card-price span{
    font-size:12px;
    color:#aaa;
    font-weight:400;
    margin-right:2px;
  }

  /* ===== CTA BUTTON ===== */
  .view-btn{
    width:100%;
    height:45px;
    border-radius:999px;
    border:1.5px solid var(--orange-light);
    background:linear-gradient(180deg,#FFFFFF, #FFF6EC);
    color:var(--black);
    font-size:13px;
    font-weight:700;
    letter-spacing:1px;
    cursor:pointer;
    margin-top:8px;
    transition:background .2s, transform .15s, box-shadow .2s;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
  }
  .view-btn:active{transform:scale(0.97);}
  .view-btn:hover{
    background:var(--orange-light);
    color:var(--white);
    box-shadow:0 6px 16px rgba(255,128,0,0.3);
  }

  /* ===== AR MODAL ===== */
  .ar-modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.45);
    z-index:1000;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity .3s ease;
  }
  .ar-modal-overlay.open{
    opacity:1;
    pointer-events:all;
  }
  .ar-modal{
    width:100%;
    max-width:520px;
    background:#FFFFFF;
    border-radius:28px 28px 0 0;
    padding:14px 14px 22px;
    transform:translateY(100%);
    transition:transform .35s cubic-bezier(.32,.72,0,1);
    box-shadow:0 -10px 40px rgba(0,0,0,0.2);
    position: relative;
  }
  .ar-modal-overlay.open .ar-modal{
    transform:translateY(0);
  }
  .ar-modal-handle{
    width:42px;height:5px;
    background:#ddd;
    border-radius:99px;
    margin:4px auto 12px;
  }
  .ar-modal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 6px 10px;
  }
  .ar-modal-header h3{
    font-size:18px;
    font-weight:700;
    font-family:'Playfair Display',serif;
  }
  .ar-modal-close{
    width:32px;height:32px;
    border-radius:50%;
    background:#f0f0f0;
    border:none;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  
  /* Plus Button Layout Fix */
  .modal-action-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 10px;
  }

  .ar-add-more-btn {
    background: #f0f0f0;
    color: var(--black);
    border: 1px solid #ddd;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    font-size: 20px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .ar-add-more-btn:active { transform: scale(0.9); }
  .ar-add-more-btn.active-added {
    background: var(--orange);
    color: white;
    border-color: var(--orange);
  }

  /* Multi Model View Area Container */
  .viewer-container {
    width: 100%;
    height: 50vh;
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    background: #f9f9f9;
  }
  .viewer-container model-viewer {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    background-color: transparent !important;
    --poster-color: transparent;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .viewer-container model-viewer.visible-model {
    opacity: 1;
    pointer-events: auto;
  }

  .ar-modal-footer{
    display:flex;
    gap:10px;
    margin-top:14px;
    width: 100%;
  }
  .ar-modal-footer button{
    flex:1;
    height:46px;
    border-radius:999px;
    border:none;
    font-weight:700;
    font-size:13px;
    letter-spacing:1px;
    cursor:pointer;
  }
  .ar-modal-footer .ar-launch{
    background:var(--orange);
    color:#fff;
  }
  .ar-modal-footer .ar-cancel{
    background:#fff;
    color:var(--black);
    border:1.5px solid #eee;
  }

  .no-results{
    grid-column:1/-1;
    text-align:center;
    padding:50px 20px;
    color:#999;
    font-size:14px;
  }
</style>
</head>

/* =========================================================
   MULTI-MODEL AR WORKFLOW TRACKER
========================================================= */
let selectedModelsTrack = []; 
const sessionBanner = document.getElementById('sessionBanner');
const sessionText = document.getElementById('sessionText');
const clearSessionBtn = document.getElementById('clearSessionBtn');

function updateSessionUI() {
  if (selectedModelsTrack.length > 0) {
    sessionBanner.style.display = 'flex';
    sessionText.textContent = `${selectedModelsTrack.length} Item(s) ready for multi-AR display.`;
  } else {
    sessionBanner.style.display = 'none';
  }
}

clearSessionBtn.addEventListener('click', () => {

  updateSessionUI();
  renderGrid();
});

const placeholderItems = ["Chicken_Paprika", "Fajita Pizza", "BBQ Platter", "Zinger Burger"];
const fx = document.getElementById('placeholderFx');
let pIdx = 0, charIdx = 0, deleting = false;

function typeLoop(){
  const word = "Search “" + placeholderItems[pIdx] + "”";
  if(!deleting){
    charIdx++;
    fx.textContent = word.slice(0, charIdx);
    if(charIdx === word.length){
      deleting = true;
      setTimeout(typeLoop, 1400);
      return;
    }
  } else {
    charIdx--;
    fx.textContent = word.slice(0, charIdx);
    if(charIdx === 0){
      deleting = false;
      pIdx = (pIdx + 1) % placeholderItems.length;
    }
  }
  setTimeout(typeLoop, deleting ? 35 : 65);
}
typeLoop();

/* =========================================================
   RENDER GRID
========================================================= */
const grid = document.getElementById('menuGrid');
let currentCategory = "All Items";
let currentSearch = "";

function getFilteredItems(){
  let items = MENU_DATA;
  if(currentCategory !== "All Items"){
    items = items.filter(i => i.category === currentCategory);
  }
  if(currentSearch.trim() !== ""){
    const q = currentSearch.trim().toLowerCase();
    items = items.filter(i => i.name.toLowerCase().includes(q));
  }
  return [...items].sort((a,b) => (b.has3d === true) - (a.has3d === true));
}

function renderGrid(){
  const items = getFilteredItems();
  grid.innerHTML = "";

  if(items.length === 0){
    grid.innerHTML = `<div class="no-results">No items found in this category.</div>`;
    return;
  }

  items.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = "card";
    card.style.animationDelay = (idx * 0.03) + "s";

    let thumbHtml = `
      <div class="card-thumb">
        ${item.has3d ? '<span class="badge-3d">3D / AR</span>' : ''}
        <img src="${item.image}" alt="${item.name}" loading="${idx < 4 ? 'eager' : 'lazy'}"
             onerror="this.style.background='#F5F0EA';">
      </div>`;

    card.innerHTML = `
      ${thumbHtml}
      <div class="card-body">
        <div class="card-title">${item.name}</div>
        <div class="card-desc">${item.desc}</div>
        <div class="card-price"><span>Rs.</span>${item.price.toLocaleString()}</div>
        <button class="view-btn" data-idx="${MENU_DATA.indexOf(item)}">VIEW ON TABLE</button>
      </div>
    `;
    grid.appendChild(card);
  });

  grid.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const item = MENU_DATA[btn.dataset.idx];
      handleViewOnTable(item);
    });
  });
}

/* =========================================================
   AR / MULTI-MODEL PREVIEW MANAGEMENT
========================================================= */
const arOverlay = document.getElementById('arOverlay');
const viewerContainer = document.getElementById('viewerContainer');
const arModalTitle = document.getElementById('arModalTitle');
const arLaunch = document.getElementById('arLaunch');
const arClose = document.getElementById('arClose');
const arCancel = document.getElementById('arCancel');
const arAddMore = document.getElementById('arAddMore');

let lastSelectedActiveItem = null;

function handleViewOnTable(item){
  lastSelectedActiveItem = item;
  arModalTitle.textContent = item.name;
  viewerContainer.innerHTML = ""; 

  if(!item.has3d){
    // Fallback static image view
    viewerContainer.innerHTML = `<img src="${item.image}" style="width:100%; height:100%; object-fit:contain; background:#FFF;">`;
    arLaunch.style.display = 'none';
    arAddMore.style.display = 'none';
    arOverlay.classList.add('open');
    return;
  }

  arLaunch.style.display = 'block';
  arAddMore.style.display = 'flex';

  // Check if this item is already added to session stack
  if (selectedModelsTrack.includes(item)) {
    arAddMore.textContent = "✓ Added";
    arAddMore.classList.add('active-added');
  } else {
    arAddMore.textContent = "＋";
    arAddMore.classList.remove('active-added');
  }

  // Load all currently tracked items + this main item into a side-by-side or stacked viewer scene
  let uniqueDisplayItems = [...selectedModelsTrack];
  if (!uniqueDisplayItems.includes(item)) {
    uniqueDisplayItems.push(item);
  }

  // Generate dynamic overlay viewers so everything renders simultaneously inside the same boundary box
  uniqueDisplayItems.forEach((displayItem, dIdx) => {
    const mv = document.createElement('model-viewer');
    mv.setAttribute('src', displayItem.model);
    mv.setAttribute('ios-src', displayItem.modelIos);
    mv.setAttribute('alt', displayItem.name);
    mv.setAttribute('camera-controls', '');
    mv.setAttribute('auto-rotate', '');
    mv.setAttribute('shadow-intensity', '1');
    mv.setAttribute('exposure', '1.2');
    mv.setAttribute('interaction-prompt', 'none');
    mv.className = "visible-model";
    
    // Simple custom layout offset adjustments so they don't look completely stacked directly behind each other
    if(dIdx > 0) {
      mv.setAttribute('camera-orbit', `${dIdx * 45}deg 75deg 105%`);
    }

    viewerContainer.appendChild(mv);
  });

  // Native trigger launching multiple elements context
  arLaunch.onclick = () => {
    if(!selectedModelsTrack.includes(item)) {
      selectedModelsTrack.push(item);
    }
    updateSessionUI();
    
    // Find first active model-viewer element to use system intent launcher
    const targetViewer = viewerContainer.querySelector('model-viewer');
    if(targetViewer && typeof targetViewer.activateAR === 'function'){
       targetViewer.activateAR();
    }
  };

  arOverlay.classList.add('open');
}

// Plus Button Toggle behavior
arAddMore.addEventListener('click', () => {
  if (!lastSelectedActiveItem) return;

  const matchIdx = selectedModelsTrack.indexOf(lastSelectedActiveItem);
  if (matchIdx > -1) {
    // Remove if already exists
    selectedModelsTrack.splice(matchIdx, 1);
    arAddMore.textContent = "＋";
    arAddMore.classList.remove('active-added');
  } else {
    // Add to stack
    selectedModelsTrack.push(lastSelectedActiveItem);
    arAddMore.textContent = "✓ Added";
    arAddMore.classList.add('active-added');
  }
  
  updateSessionUI();
  // Refresh modal window view to reflect added models stack inside the single window
  handleViewOnTable(lastSelectedActiveItem);
});

function closeFallback(){
  arOverlay.classList.remove('open');
}

arClose.addEventListener('click', closeFallback);
arCancel.addEventListener('click', closeFallback);
arOverlay.addEventListener('click', (e) => {
  if(e.target === arOverlay) closeFallback();
});

/* =========================================================
   TABS & SEARCH INITIALIZATION
========================================================= */
document.getElementById('tabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.tab');
  if(!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentCategory = tab.dataset.cat;
  renderGrid();
});

document.getElementById('searchInput').addEventListener('input', (e) => {
  currentSearch = e.target.value;
  renderGrid();
});

renderGrid();
</script>
</body>
</html>
